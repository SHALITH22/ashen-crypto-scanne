name: Scan

# Re-committed 2026-07-14 to force GitHub's workflow indexer to discover
# this file - workflows added in the very first push to a brand-new empty
# repo sometimes never get registered (confirmed here: this file never
# appeared in the Actions "Filter by Workflow" list, and manual dispatch
# returned "This workflow does not exist" despite correct syntax, Actions
# being fully allowed, and the file being present on the default branch).
# A follow-up commit that actually touches the file resolves it.
on:
  schedule:
    # Every 5 minutes, offset from :00/:05/:10... - explicit comma list
    # (not a "2-59/5" range/step expression) because that's the exact
    # syntax style already proven reliable here (the previous 20-minute
    # cadence used "3,23,43 * * * *" and fired correctly for days) -
    # switched to this after the range/step version went 20+ minutes with
    # zero scheduled runs firing (confirmed via the Actions API), an
    # unusually long gap even accounting for GitHub's documented
    # scheduling delays. GitHub's own docs warn on-the-hour schedules hit
    # peak load and are frequently delayed or dropped. Matches
    # pair_rotation's 4-slice cycle (see
    # scanner.data.get_rotating_pair_slice and main.py's
    # top_volume_lightweight fallback): live pair-ranking is blocked on
    # every GH Actions run in practice, so the static-list fallback now
    # rotates a disjoint ~157-pair slice of the full ~528-pair universe
    # each run instead of always scanning the same fixed subset - 4 slices
    # x 5 minutes = every pair covered once per 20-minute cycle, same
    # total latency as before, but spread across the whole universe
    # instead of one fixed 157-pair list. Confirmed locally: a single run
    # takes ~2-3 minutes end to end (see recent run durations in the
    # Actions tab), comfortably inside a 5-minute slot.
    # IMPORTANT: if crypto_universe.json grows past 4 x 157 = 628 pairs,
    # get_rotating_pair_slice will silently start using 5 slices instead
    # of 4 (ceil(len/157)), which no longer divides evenly into a 20-minute
    # cycle at this 5-minute cadence - the comment in that function's
    # docstring covers this; cron would need to move to every 4 minutes
    # (5 x 4 = 20) at that point.
    # NOTE: this cadence needs the repo to be public - a private repo only
    # gets 2,000 free Actions minutes/month, and a full scan run takes several
    # minutes, so this would blow through that budget in days. Public
    # repos get unlimited free minutes. (No secrets live in the code - the
    # bot token/chat id are GitHub encrypted secrets referenced via env:
    # below, never committed - so making this public doesn't expose them.)
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"  # every 5 minutes, UTC, offset from :00
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write   # needed to commit journal.jsonl back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: Telegram   # secrets were saved as environment secrets under this name
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Cloudflare Worker relay for the ~371 long-tail pairs not on
          # Binance.US (binance.com itself 451s every GitHub Actions
          # request - see scanner/data.py module docstring). Both optional:
          # missing BINANCE_PROXY_URL just means long-tail pairs get
          # "no_data" errors (same as before this feature existed), not a
          # failed run. Set both as repo secrets - Settings -> Secrets and
          # variables -> Actions -> New repository secret.
          BINANCE_PROXY_URL: ${{ secrets.BINANCE_PROXY_URL }}
          BINANCE_PROXY_SECRET: ${{ secrets.BINANCE_PROXY_SECRET }}
        run: python main.py

      - name: Check journal outcomes
        run: python journal_check.py

      - name: Commit journal updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # journal.jsonl/failed_trades.jsonl are append-only and multiple
          # runs (15-min schedule + manual triggers) can genuinely overlap -
          # git's default line-based merge treats "both sides appended
          # different new rows" as a hard conflict and fails the whole step,
          # silently losing that run's journal writes. This content-aware
          # driver (scripts/merge_journal.py, wired via .gitattributes)
          # merges by (symbol, timeframe, detector, logged_at) instead, so
          # a normal overlapping-run race resolves automatically.
          git config merge.journal-merge.name "journal.jsonl/failed_trades.jsonl content-aware merge"
          git config merge.journal-merge.driver "python scripts/merge_journal.py %O %A %B"
          touch journal.jsonl failed_trades.jsonl
          git add journal.jsonl failed_trades.jsonl scan_health.json
          git diff --cached --quiet || git commit -m "Update journal [skip ci]"
          # Retry a few times in case another run's push lands in the
          # narrow window between our pull and our push.
          for i in 1 2 3; do
            if git pull --rebase --autostash && git push; then
              break
            fi
            echo "push attempt $i failed, retrying in 5s..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
