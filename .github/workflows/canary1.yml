name: Canary 1

# Disposable diagnostic - NOT part of the live pipeline. Answers one
# question: does GitHub throttle scheduled (cron) triggers per-workflow-
# file, or per-repo/account? Scan.yml's own scheduled runs have shown a
# persistent 60-210 minute actual gap regardless of its configured 5/20
# minute interval, going back at least to 2026-07-16 - this (and its 3
# siblings, canary2/3/4.yml) each fire on their own 5-minute cadence at a
# DIFFERENT clock-minute offset than Scan.yml and each other, so their
# real fire times can be compared side by side against Scan's own
# history. If these fire close to on-time while Scan doesn't, the
# throttle is per-file (splitting Scan into multiple files would help).
# If these show the same 60+ minute gaps, it's a shared repo/account
# budget (splitting Scan wouldn't help - see the conversation this came
# from for the full reasoning).
#
# Does nothing but log a timestamp - no checkout, no journal writes, no
# repo commits. Safe to run as often as GitHub allows. Delete once the
# question above is answered.
on:
  schedule:
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"
  workflow_dispatch: {}

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - run: echo "canary1 fired at $(date -u +%Y-%m-%dT%H:%M:%S)Z"
