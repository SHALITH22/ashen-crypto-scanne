# Timeframes to analyze (Binance kline intervals)
timeframes:
  - 15m
  - 1h
  - 2h
  - 4h
  - 6h
  - 8h
  - 1d
  - 1w
  - 1M

# How many candles to fetch per timeframe (max 1000)
candle_limit: 300

# How many pairs (main.py) / open journal entries (journal_check.py) to
# fetch concurrently. Each pair's own timeframes are still fetched
# sequentially - this parallelizes across pairs/entries, not within one.
# Needed to fit a full 100-pair x 9-timeframe scan inside a 15-minute
# schedule (~13 min serially vs a few minutes at this concurrency).
# get_klines already retries with backoff on 429s, so raising this is safe
# up to a point, but too high risks harsher rate-limiting from Binance.
scan_concurrency: 8

# --- Indicator settings ---
indicators:
  ema_periods: [20, 50, 200]
  stochrsi:
    rsi_length: 14
    stoch_length: 14
    k: 3
    d: 3
  volume_ma_period: 20

# --- Signal thresholds ---
signals:
  stochrsi_oversold: 20
  stochrsi_overbought: 80
  # Only fire StochRSI signal when %K is already reversing out of the extreme
  # (fewer but higher-quality signals). Set false for the old behavior.
  stochrsi_require_turn: true
  # Volume spike = current volume vs volume MA
  volume_spike_multiplier: 2.0
  # Support/resistance touch tolerance (percent)
  sr_tolerance_pct: 0.5
  # Minimum touches to consider a level valid
  sr_min_touches: 3
  # How many trailing candles the pivot/pattern detectors look across
  # (double top/bottom, head & shoulders, triangles, wedges)
  pattern_lookback: 150
  # How close two peaks/troughs must be (percent) to count as "equal" for
  # double top/bottom and head & shoulders shoulder-matching
  pattern_tolerance_pct: 1.5
  # Minimum head-to-neckline depth (percent) for head & shoulders / inverse -
  # rejects shallow, noise-level "shoulders" that technically match but aren't real
  hs_min_depth_pct: 1.0
  # --- Flag/pennant continuation pattern ---
  flag_pole_window: 10       # candles used to measure the "pole" move
  flag_window: 8             # candles used to measure the consolidation after the pole
  flag_min_pole_pct: 5.0     # minimum pole move (percent) to qualify as a real pole
  flag_max_pole_pct: 50.0    # maximum pole move (percent) - beyond this it's a listing crash/pump, not a flagpole
  flag_max_range_ratio: 0.5  # consolidation range must be <= this fraction of the pole's range
  # --- Candlestick patterns ---
  candle_trend_lookback: 5   # candles back used to confirm prior trend for hammer/shooting star
  # --- RSI divergence ---
  divergence_min_price_pct: 0.5  # min price swing size (percent) between the two pivots compared
  divergence_min_rsi_diff: 3.0   # min RSI difference (points) between the two pivots to count as real divergence
  divergence_require_extreme: true  # only count divergence at an oversold/overbought RSI extreme (textbook usage)
  rsi_oversold: 30
  rsi_overbought: 70

# --- Weighted confluence ---
# Weights each detector's contribution to `strength` by its backtested edge
# over the direction baseline (from backtest_results.json), instead of
# counting every signal equally - e.g. ascending_triangle (real edge) counts
# for more than engulfing (no edge) or rsi_divergence (below baseline).
confluence:
  use_backtest_weights: true
  min_signals: 30       # backtested sample size needed before a detector's weight is trusted
  horizon: h10           # which backtest horizon (h5/h10/h20) the weight is computed from
  weight_scale: 5.0       # how strongly win-rate edge translates into weight
  weight_clamp: [0.2, 2.5]

# --- Risk management ---
# Chart patterns (double top/bottom, H&S, triangle/wedge, flag/pennant)
# compute stop/target from their own geometry (invalidation level / measured
# move). Everything else falls back to these ATR-based levels.
risk:
  atr_multiplier: 1.5      # stop distance for non-structural signals, in ATR units
  reward_risk_ratio: 2.0   # target distance = stop distance * this ratio
  # ATR scales with candle size - on 1w/1M timeframes a fixed multiplier can
  # put the stop 30-40% away, which isn't a usable plan. Cap it (percent of price).
  # Confirmed against two real leveraged trades (EPICUSDT 1w, TACUSDT 1d):
  # both got stopped out within ~0.5% of the exact calculated stop price - the
  # math is correct - but an 8% stop at 10-20x leverage produces an 80-160%
  # margin loss on one ordinary, expected stop-out. Halved to keep a single
  # stop-out survivable at the leverage levels actually being used; this only
  # affects generic ATR-based signals (structural patterns compute their own
  # geometry-based stop, uncapped, since that's tied to real chart structure).
  max_stop_pct: 4.0
  # Reject any candidate whose stop is closer than this (percent of price) -
  # a real stop this tight can get triggered by ordinary bid-ask spread or
  # slippage alone, something a candle-based backtest can't see (win rate
  # stayed flat 27-31% across every stop-width bucket including <0.2%,
  # because the backtest assumes a perfect fill with no execution
  # friction). Applies to every candidate, structural or generic - this is
  # about real-world tradeability, not detector edge.
  min_stop_pct: 0.5
  # A structural pattern's stop and target come from independent geometry
  # (e.g. a flag's stop is the whole consolidation, its target is just the
  # pole height) - nothing guarantees a favorable ratio. Reject any risk
  # plan whose reward:risk falls below this rather than showing a setup
  # that risks more than it could gain.
  min_risk_reward: 1.0
  # Per-strategy override of the floor above - only marubozu_ashen needs
  # one so far, since its target was deliberately shrunk (see
  # ashen.marubozu.reward_risk_ratio) below what the shared 1.0 floor
  # allows. 0.4 sits safely below marubozu's new effective R:R (~0.51,
  # after the 0.85 target_fraction trim below) with margin for float
  # rounding, while still rejecting anything degenerate. Leave unset (or
  # remove a strategy's key) to fall back to the flat min_risk_reward
  # above - see scanner/risk.py's _resolve_min_rr.
  min_risk_reward_overrides:
    marubozu_ashen: 0.4
  # Replace the geometric/ATR target with the detector's real historical
  # average move (from backtest_results.json) when available, so the
  # reported scenario reflects what price has actually tended to do -
  # skipped if that average move is smaller than this (percent), since a
  # near-zero empirical move isn't a meaningful target either.
  min_calibrated_move_pct: 0.3
  # Take profit at this fraction of the full geometric/calibrated target
  # instead of waiting for 100% of it. Confirmed via a 6000+ trade backtest
  # (win_rate_levers_backtest.py) that 0.85 is a small, genuine improvement
  # (higher win rate AND higher expectancy than 1.0) - lower fractions
  # raise win rate further but give back more expectancy than they gain,
  # so this isn't a "chase win rate" knob, it's the one point on that
  # curve that's actually better on both axes.
  target_fraction: 0.85
  # A detector/direction is refused as a trade basis once its EXPECTANCY
  # (win_rate * (1 + avg R:R) - 1, i.e. real profit/loss in units of risk)
  # goes below this, using the live journal once it has min_reliable_n
  # decided trades, falling back to realistic_backtest.py's large-scale
  # historical simulation otherwise - both respect the actual stop/target,
  # unlike backtest_results.json's naive N-candle forward return, which can
  # look like edge while actually losing money once a realistic stop is
  # respected. Expectancy (not a flat win-rate bar) matters because R:R
  # varies hugely by detector - e.g. a structural pattern with a 15:1 R:R
  # only needs a ~6% win rate to profit, so comparing every detector
  # against one flat win-rate threshold would blacklist the system's best
  # performers alongside its worst (this happened once already - a flat
  # 0.35 win-rate bar blacklisted ascending_triangle/bullish, a detector
  # profitable at a 29.3% win rate against its own ~6.3% breakeven).
  # 0.0 = breakeven; only negative-expectancy detectors are blocked.
  min_detector_expectancy: 0.0
  min_reliable_n: 10
  # Professional rule: risk a fixed small % of account equity per trade,
  # sized off the actual stop distance - never a guess, never scaled by
  # conviction. Set account_size to your real trading account value (in
  # quote currency, e.g. USDT) to see suggested position sizes in alerts;
  # leave null to omit sizing entirely (we never guess your account size).
  # Set to 10,000 USDT / 1% risk per trade - the safeguard being that even
  # a run of 100 consecutive losing trades stays theoretically survivable,
  # since each one only ever risks 1% of current equity, never a fixed
  # notional amount that ignores drawdown.
  account_size: 10000
  account_risk_pct: 1.0

# --- Live signal journal ---
# Logs every setup meeting min_confluence to journal.jsonl, then
# journal_check.py resolves outcomes against real price - a forward-tested
# track record, not just a retrospective backtest.
journal:
  enabled: true
  # Confirmed via a 6000+ trade backtest (win_rate_levers_backtest.py):
  # giving a trade more time to resolve is a small, genuine, free
  # improvement - both win rate (30.6% -> 33.0%) and expectancy
  # (+0.440R -> +0.480R) improved monotonically from 20 to 60 candles,
  # meaning "expired" setups more often just needed more room than the
  # pattern was actually broken.
  horizon_candles: 60  # if neither stop nor target is hit within this many candles, mark "expired"
  # How many of a detector's most recent decided (win/loss) trades to show
  # as its "recent form" in alerts - surfaces a current losing streak so
  # you don't act on a detector's backtested average as if it still applies.
  form_lookback: 5
  # Minimum wall-clock hours after a symbol/timeframe/detector setup
  # resolves (win/loss/expired) before it's allowed to open a fresh entry
  # again. Without this, a persistent condition (e.g. ema_stack holding
  # through an uptrend) re-opens the instant it resolves, which looked
  # live as the same pair/detector alerting every scan cycle back-to-back
  # (e.g. ARBUSDT qqe_cross, ETHUSDT ema_stack firing every ~8-20 min).
  reopen_cooldown_hours: 6.0
  # Caps how many OPEN entries a single symbol can have at once, across
  # every timeframe and strategy combined - strategy_correlation_analysis.py
  # found a real peak of 13 trades simultaneously open on one symbol
  # (KAVAUSDT), meaning up to 13% of the account concurrently at risk on
  # one coin's price action at 1% risk/trade - well beyond what "5
  # strategies x 1% each" implies as a worst case, since a single strategy
  # firing across several timeframes at once (15m, 1h, 2h, 4h...) stacks
  # just as much as 5 different strategies agreeing would. 5 is a starting
  # point (roughly "one open trade per live strategy per symbol"), not a
  # backtested-optimal number - tune freely. Set to null to disable the cap
  # entirely (restores the pre-cap behavior).
  max_concurrent_per_symbol: 5
  # Caps TOTAL open risk across every symbol combined, as a % of account
  # equity - max_concurrent_per_symbol only bounds any ONE symbol, so
  # nothing stopped the sum across all ~150+ scanned symbols from growing
  # unbounded. paper_trading.py's first real run surfaced exactly this
  # gap: 380 trades open simultaneously, ~489% of account equity locked
  # in at once, since every trade is independently sized at
  # risk.account_risk_pct with no awareness of how many others are
  # already open. 20% is a standard "portfolio heat" ceiling (widely used
  # risk-management convention, not backtested-optimal for this system
  # specifically) - at risk.account_risk_pct=1.0 below, this caps at 20
  # concurrent open trades account-wide. Set to null to disable.
  max_total_open_risk_pct: 20

# --- Output ---
output:
  # console, json, or both
  mode: both
  json_path: signals_output.json
  # Only report setups with at least this many confluent signals
  min_confluence: 2

# --- Multi-timeframe confluence ---
mtf:
  # If true, the console only shows setups whose higher timeframes do not
  # conflict (JSON output keeps everything, annotated with htf_agrees/htf_note)
  require_agreement: true

# --- Notifications ---
notify:
  telegram:
    enabled: true           # master switch is on, but notify._telegram_ready still holds every
                             # actual send until min_resolved_trades below is met - matches the
                             # same "prove it over N real trades before trusting it" discipline
                             # used for the original binance-scanner, now automatic instead of a
                             # manual flip. TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID are already set as
                             # repo secrets (see .github/workflows/scan.yml's Telegram environment).
    min_resolved_trades: 1000  # resolved (win/loss/expired) trades across ALL five strategies
                                # combined, required before the first alert is ever sent
    min_strength: 3         # only alert on setups at least this strong
    only_htf_agreeing: true # skip setups whose higher timeframes conflict
    # All timeframes are eligible for alerts (no allowlist). Scans run
    # frequently (see .github/workflows/scan.yml) so even fast timeframes
    # get caught and read close to when they actually fire.
    # timeframes: [4h, 8h, 1d, 1w, 1M]   # uncomment to restrict again
    # A setup only fires its full alert once (see main.py's new_keys dedup).
    # While it stays open, send a short "still open" ping at most this often
    # - not a repeat of the full message, just enough to say it's still live.
    reminder_cooldown_hours: 4.0
