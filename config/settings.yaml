# ============================================
# Binance Multi-Timeframe Pattern Scanner Config
# Edit this file to change behavior - no code changes needed
# ============================================

# --- Jayantha strategy (replaces the old generic multi-pattern detector
# set entirely - see scanner/jayantha_detectors.py) ---
# B2B ("buy near the moving average, sell away from it"): enter on
# pullbacks/rallies to a rising/falling MA inside an established trend,
# only once a closed candle actually confirms the bounce/rejection -
# never on an approaching level or a wick-only touch.
jayantha:
  enabled: true

  b2b:
    # MA periods maintained internally by the detector (independent of
    # indicators.ema_periods below, which only the retired old detector
    # set used).
    ma_periods: [20, 50, 100, 200]
    entry_ma_period: 50       # pullback/rally target (the MA price must reach)
    trend_ma_period: 200      # trend filter only (price must stay on the trend side of this)
    stop_ma_period: 100       # stop sits just beyond THIS MA, not trend_ma_period -
                               # trend_ma_period is deliberately too far from a 50-MA
                               # pullback entry to produce a sane risk:reward
    pullback_tolerance_pct: 1.5   # how close to entry_ma_period counts as "touched"
    min_pullback_depth_pct: 2.0   # reject shallow, noise-level pullbacks

  confirmation:
    min_close_beyond_level_pct: 0.2   # close must clear the MA by at least this much
    fakeout_detection_candles: 5
    require_closed_candle: true
    # Confirmation score (0-1) below this discards the setup entirely -
    # a wick-only touch or barely-there close never reaches the journal
    # or Telegram, matching the "confirmation before conviction" rule.
    min_confirmation_to_fire: 0.3
    # Only above this does the setup earn the extra jayantha_confirmation
    # confluence signal (a genuinely clean, well-confirmed close).
    min_confirmation_bonus: 0.65

# --- Ashen strategy ("Trading with Ashen" video series) - runs ALONGSIDE
# Jayantha's B2B, not instead of it (this is a second, independent trader's
# rules, added as four more detectors feeding the same signals list). Each
# has its own geometry-based stop/target - see scanner/ashen_*.py for the
# exact rule per detector, cited from the source videos.
ashen:
  enabled: true

  b2b:
    # "Bulls-to-bears" counter-candle continuation - NOT the same setup as
    # jayantha.b2b despite the shared name (see scanner/ashen_b2b.py).
    enabled: true
    min_run_length: 3       # same-colored candles required immediately before the counter-candle
    lookback: 15            # how far back to count prior counter-candle occurrences in this run
    max_occurrence: 2       # only the 1st/2nd counter-candle in a run is tradeable; 3rd+ rejected
    reward_risk_ratio: 1.5

  ma_cross:
    # 20/200 SMA regime + a single dominant candle triggers entry.
    enabled: true
    fast_period: 20
    slow_period: 200
    dominance_lookback: 10       # candle must be bigger than every one of these preceding candles
    dominance_multiplier: 1.5    # ...by at least this much (vs. the largest of them)
    max_opposing_wick_ratio: 0.25  # opposing wick must be no more than this fraction of the candle's range
    reward_risk_ratio: 1.5

  marubozu:
    # Single-candle pattern, but DOES use 100/200 SMA as an extension
    # filter (reject an otherwise-valid Marubozu that's already run too
    # far beyond either MA - see ashen_marubozu.py).
    enabled: true
    min_body_ratio: 0.85    # body must be at least this fraction of the full high-low range
    max_wick_ratio: 0.10    # each wick must be no more than this fraction of the range
    # Ashen's own stated target was 1.2 (already deliberately lower than
    # the 1.5 used elsewhere). Lowered further to 0.6 backed by
    # marubozu_rr_floor_backtest.py (1600+ simulated trades): every
    # smaller-target variant beat the 1.2 baseline in both directions,
    # and bearish specifically crosses from -0.003R to +0.013R at this
    # exact ratio - the strongest result in the whole sweep. Needs a
    # matching per-strategy floor override below (risk.min_risk_reward_
    # overrides) since this strategy's effective R:R, after the existing
    # global 0.85 target_fraction trim, no longer clears the shared 1.0
    # floor sized for the other four strategies' bigger targets.
    reward_risk_ratio: 0.6
    stop_buffer_pct: 0.1    # stop sits this % beyond the candle's OPEN (its start point), not its wick
    extension_ma_periods: [100, 200]
    max_extension_multiplier: 5.0  # "too extended" = distance to an MA exceeds this many candle-ranges

  vwap_breakout:
    # The only Ashen strategy needing two nested timeframes (HTF for
    # trend/structure, LTF for VWAP entry timing) - see htf_pairing below.
    enabled: true
    htf_swing_lookback: 20  # candles used to find the HTF swing high/low (structure level)
    vwap_window: 96         # rolling candle window for the LTF's own VWAP (~24h on 15m candles)
    atr_period: 14
    atr_multiplier: 1.0     # stop = entry candle low/high -+ ATR * this
    reward_risk_ratio: 1.5
    # Higher-timeframe pairing per entry timeframe - Ashen's rule is this
    # pairing must "flow continuously" (e.g. 1h+15m, daily+4h). A timeframe
    # missing here (or whose paired HTF isn't itself in the scanned
    # `timeframes` list below) simply never fires this one detector -
    # every other Ashen/Jayantha detector is unaffected.
    htf_pairing:
      15m: 1h
      1h: 4h
      2h: 8h
      4h: 1d
      6h: 1d
      8h: 1d
      1d: 1w
      1w: 1M

# Pairs to scan.
# pairs_mode: top_volume_lightweight -> DEFAULT as of 2026-07-12. Ranks a
#   live ticker/24hr call against a pre-built static universe file
#   (crypto_universe.json) instead of requiring live exchangeInfo
#   discovery. Added because binance.com hard-blocks GitHub Actions' IPs
#   ENTIRELY (confirmed - see scanner/data.py module docstring), and
#   exchangeInfo/ticker discovery deliberately never falls back to
#   Binance.US (a discovery source needs the real global catalog, not a
#   smaller/different one - see get_all_usdt_pairs' docstring). Without
#   this, scan_all/top_volume silently returned [] on every GitHub Actions
#   run for 24+ hours before anyone noticed (scan_health.json's
#   total_pairs was the first thing to actually surface it).
#   crypto_universe.json must be refreshed periodically from a network
#   that can actually reach binance.com - see scripts/refresh_universe.py.
# pairs_mode: top_volume -> recomputed fresh from a LIVE exchangeInfo call
#   (works locally/non-blocked networks, returns [] on GitHub Actions).
# pairs_mode: static     -> always use the `pairs` list below verbatim.
# scan_all: true          -> ignore pairs_mode, fetch every USDT perpetual
#   via live exchangeInfo (~530 pairs; same GitHub Actions block as above).
scan_all: false
pairs_mode: top_volume_lightweight
top_n_pairs: 157

# Long-tail coverage: the ~371 real Binance USDT perpetuals NOT on
# Binance.US (crypto_universe.json minus the `pairs:` list below), scanned
# via a Cloudflare Worker proxy (BINANCE_PROXY_URL env var, set in
# .github/workflows/scan.yml) instead of binance.com/Binance.US directly.
# Reduced timeframes here (not the full `timeframes:` list further down)
# to stay inside the proxy's free-tier request budget: at 20-min cadence,
# ~371 pairs x 2 timeframes ~= 80k requests/day, under Cloudflare Workers'
# 100k/day free cap.
#
# DISABLED 2026-07-12: tested end-to-end via a deployed Cloudflare Worker
# (binance-fapi-proxy.s17001360.workers.dev) with the correct secret -
# 0/1284 requests succeeded, every single one rejected with a CloudFront-
# branded 403 (see scanner.data.get_proxy_stats, written to
# scan_health.json's proxy_stats field: {"attempts": 1284, "successes": 0,
# "last_status": 403}). Root-path and disallowed-path requests to the SAME
# Worker succeeded fine, proving the Worker itself was reachable and
# correctly deployed - only requests that trigger the Worker's OWN
# outbound fetch to fapi.binance.com failed, and identically from two
# completely different networks (this session's sandbox AND GitHub
# Actions' Azure IPs). This points to Binance's own CDN (also fronted by
# CloudFront) blocklisting Cloudflare Workers' shared egress IP range
# outright, the same way it already blocks GitHub Actions' - not
# something fixable in our code. Left in place (not deleted) in case
# Binance's blocklist ever changes; re-enable by setting enabled: true.
long_tail:
  enabled: false
  timeframes:
    - 4h
    - 1d

# Last-resort fallback only - used if even the lightweight ticker/24hr call
